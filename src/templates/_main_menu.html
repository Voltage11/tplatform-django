<!-- 1. Шапка меню (Navbar) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Тестирование</a>

        <!-- Кнопка для мобильных -->
        <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                {% for menu_item in main_menu %}
                    <li class="nav-item">
                        <a
                                class="nav-link {% if menu_item.is_active %}active{% endif %}"
                                href="{{ menu_item.url }}"
                        >
                            {{ menu_item.title }}
                        </a>
                    </li>
                {% endfor %}
            </ul>
            <!-- Ссылки для авторизации/выхода -->
            <div class="navbar-nav">
                {% if user.is_authenticated %}
                    <form action="{% url 'user:logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm">Выйти</button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light ms-lg-2" href="{% url 'user:login' %}">Войти</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
