<nav class="navbar navbar-expand-lg navbar-light">
  <div class="container-fluid">
    <!-- Логотип -->
    <a class="navbar-brand text-primary" href="#">LOGO</a>

    <!-- Бургер для мобилок -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
    >
      <span class="navbar-toggler-icon" style="transform: scale(0.7)"></span>
    </button>

    <!-- Меню -->
    {% if user.is_authenticated %}
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        {% for menu_item in main_menu %}
        <li class="nav-item">
          <a
            class="nav-link{% if menu_item.is_active %} active {% endif %}"
            href="{{ menu_item.link }}"
          >
            {{ menu_item.title }}
          </a>
        </li>
        {% endfor %}
      </ul>

      <!-- Вход / Выход -->
      <div class="d-flex align-items-center">
        <!-- Блок авторизации-->
        <div class="auth-block">
          <span>Привет, {{ user.username }}</span>
          <form action="{% url 'user:logout' %}" method="post" style="display: inline">
            {% csrf_token %}
            <button type="submit" class="btn-logout">Выйти</button>
          </form>
        </div>
      </div>
    </div>
    {% endif %}
  </div>
</nav>
